<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FigCo - Generation Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "surface-container-highest": "#d8e3fb",
                      "on-tertiary-fixed": "#141d21",
                      "primary-fixed-dim": "#adc6ff",
                      "surface-variant": "#d8e3fb",
                      "on-background": "#111c2d",
                      "primary-fixed": "#d8e2ff",
                      "inverse-on-surface": "#ecf1ff",
                      "surface-container-lowest": "#ffffff",
                      "inverse-surface": "#263143",
                      "surface-tint": "#005ac2",
                      "on-secondary": "#ffffff",
                      "secondary-fixed": "#d3e5f1",
                      "outline": "#727785",
                      "on-primary-fixed-variant": "#004395",
                      "surface-bright": "#f9f9ff",
                      "on-error": "#ffffff",
                      "surface": "#f9f9ff",
                      "outline-variant": "#c2c6d6",
                      "on-tertiary": "#ffffff",
                      "surface-dim": "#cfdaf2",
                      "on-secondary-fixed-variant": "#384953",
                      "tertiary-container": "#6d767b",
                      "background": "#f9f9ff",
                      "primary": "#0058be",
                      "on-surface": "#111c2d",
                      "error": "#ba1a1a",
                      "primary-container": "#2170e4",
                      "secondary-container": "#d3e5f1",
                      "on-secondary-fixed": "#0c1e26",
                      "on-primary-container": "#fefcff",
                      "on-tertiary-fixed-variant": "#3f484d",
                      "error-container": "#ffdad6",
                      "secondary-fixed-dim": "#b7c9d5",
                      "inverse-primary": "#adc6ff",
                      "on-secondary-container": "#566771",
                      "on-primary": "#ffffff",
                      "on-primary-fixed": "#001a42",
                      "secondary": "#50616b",
                      "surface-container": "#e7eeff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "8px",
                      "stack-md": "16px",
                      "pixel-unit": "4px",
                      "gutter": "20px",
                      "container-padding": "24px",
                      "stack-lg": "32px"
              },
              "fontFamily": {
                      "headline-lg": [
                              "Epilogue"
                      ],
                      "technical-xs": [
                              "Space Grotesk"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Epilogue"
                      ],
                      "technical-sm": [
                              "Space Grotesk"
                      ],
                      "body-lg": [

                      ],
                      "headline-xl": [

              "fontSize": {

<style>
        /* Hand-drawn/Wobbly border effect for cards */
        .wobbly-border {
            border: 2px solid #1E293B;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }
        
        /* 8-bit Blocky corner for inputs */
        .bit-border {
            border: 2px solid #1E293B;
            border-radius: 0;
            box-shadow: 4px 4px 0px 0px #1E293B;
        }

        .bit-border:focus {
            border-color: #0058be; /* Action Blue mapping to primary */
            box-shadow: 4px 4px 0px 0px #0058be;
            outline: none;
        }

        /* 8-bit button styles */
        .btn-8bit {
            border: 2px solid #1E293B;
            box-shadow: 4px 4px 0px 0px #1E293B;
            transition: all 0.1s ease;
        }
        
        .btn-8bit:hover {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #1E293B;
        }

        .btn-8bit-active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #1E293B;
            background-color: #d8e2ff; /* primary-fixed */
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex">
<!-- SideNavBar (Suppressed as this is a focused modal/generation page per rules, but keeping it visible as it's a main workspace action in a dev tool context. Wait, rules say "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Linear/Transactional: Login, Sign-up, Onboarding, Checkout, or "Success/Confirmation" splash screens. Task-Focused: Any sub-page featuring a "Close" or "Back" action that implies a temporary departure from the main navigation flow."
    This is a "focused modal or page". I will suppress the SideNav and TopNav to focus on the canvas as instructed for task-focused pages.) -->
<!-- TopNavBar (Suppressed) -->
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-container-padding relative">
<!-- Background Grid Pattern for Doodle/Tech vibe -->
<div class="absolute inset-0 pointer-events-none opacity-5" style="background-image: radial-gradient(#111c2d 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Back Button (implies task-focused) -->
<button class="absolute top-8 left-8 flex items-center gap-2 text-on-surface hover:text-primary font-technical-sm text-technical-sm z-10 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
            Back to Workspace
        </button>
<!-- Generation Modal / Card -->
<div class="w-full max-w-2xl bg-surface-container-lowest wobbly-border shadow-[8px_8px_0px_0px_#1E293B] p-stack-lg relative z-10">
<!-- Header -->
<div class="mb-stack-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm">Generate Component</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Paste your Figma URL and let FigCo work its magic.</p>
</div>
<!-- Input Section -->
<div class="mb-stack-lg space-y-stack-md">
<label class="block font-technical-sm text-technical-sm text-on-surface" for="figma-url">Figma Frame URL</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">link</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-bright text-on-surface font-technical-sm text-technical-sm bit-border focus:ring-0" id="figma-url" placeholder="https://www.figma.com/file/..." type="text"/>
</div>
</div>
<!-- Framework Toggle -->
<div class="mb-stack-lg">
<label class="block font-technical-sm text-technical-sm text-on-surface mb-stack-sm">Target Framework</label>
<div class="flex gap-stack-md">
<button class="flex-1 py-3 px-4 bg-primary-fixed text-on-primary-fixed btn-8bit-active font-technical-sm text-technical-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">code</span>
                        React
                    </button>
<button class="flex-1 py-3 px-4 bg-surface text-on-surface btn-8bit font-technical-sm text-technical-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">integration_instructions</span>
                        Vue
                    </button>
</div>
</div>
<!-- Action Area -->
<div class="mt-stack-lg pt-stack-lg border-t-2 border-dashed border-outline-variant flex flex-col items-center">
<button class="w-full py-4 bg-primary text-on-primary btn-8bit font-headline-md text-headline-md uppercase tracking-wider flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
                    Generate Now
                </button>
<!-- Simulated 8-bit Loading Bar (Static for design purposes) -->
<div class="w-full mt-stack-md">
<div class="flex justify-between font-technical-xs text-technical-xs text-on-surface-variant mb-pixel-unit">
<span>Compiling Blocks...</span>
<span>42%</span>
</div>
<div class="w-full h-4 bg-surface-container-high border-2 border-on-surface p-[2px]">
<div class="h-full bg-primary" style="width: 42%;">
<!-- 8-bit notches inside progress bar -->
<div class="w-full h-full" style="background-image: linear-gradient(90deg, rgba(255,255,255,0.2) 2px, transparent 2px); background-size: 8px 100%;"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Decorative "Doodles" around the card -->
<div class="absolute top-1/4 left-1/4 -translate-x-32 -translate-y-16 pointer-events-none opacity-70">
<span class="material-symbols-outlined text-[48px] text-tertiary transform -rotate-12" style="font-variation-settings: 'FILL' 0;">brush</span>
</div>
<div class="absolute bottom-1/4 right-1/4 translate-x-32 translate-y-16 pointer-events-none opacity-70">
<span class="material-symbols-outlined text-[64px] text-primary transform rotate-12" style="font-variation-settings: 'FILL' 0;">draw</span>
</div>
</main>
</body></html>
